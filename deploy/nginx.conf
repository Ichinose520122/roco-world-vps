# 保存为 /etc/nginx/sites-available/roco-gallery，并按实际域名修改。
# 证书路径示例适用于 Certbot。

server {
    listen 80;
    listen [::]:80;
    server_name roki.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name roki.example.com;

    ssl_certificate /etc/letsencrypt/live/roki.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/roki.example.com/privkey.pem;

    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_request_buffering off;
    }
}

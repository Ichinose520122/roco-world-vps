services:
  app:
    image: ghcr.io/ichinose520122/roco:latest
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
      DB_PATH: /app/data/gallery.sqlite
      STORAGE_ROOT: /app/data/images
      BACKUP_DIR: /app/data/backups
    volumes:
      - gallery_data:/app/data
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}
      MAX_REQUEST_SIZE: ${MAX_REQUEST_SIZE:-32MB}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  gallery_data:
  caddy_data:
  caddy_config:
